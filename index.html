<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    // --- KONFIGURÁCIA FIREBASE (Získaj zo svojho projektu na firebase.google.com) ---
    const firebaseConfig = {
        apiKey: "TVOJA_API_KEY",
        authDomain: "TVOJ-PROJEKT.firebaseapp.com",
        databaseURL: "https://TVOJ-PROJEKT.firebaseio.com",
        projectId: "TVOJ-PROJEKT",
        storageBucket: "TVOJ-PROJEKT.appspot.com",
        messagingSenderId: "ID",
        appId: "ID-APP"
    };

    // Inicializácia
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Načítanie dát v reálnom čase
    function init() {
        db.ref('tipovacka_data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state = data.state || state;
                document.getElementById('mainTitle').innerText = state.title || "Tipovačka MS 2026";
                document.getElementById('teamInput').value = data.teams_list || "";
                document.getElementById('playerInput').value = data.players_list || "";
                updateTeamSelects(); 
                renderTable();
            }
        });
    }

    // Úprava funkcie na ukladanie
    function saveGlobal() {
        const teamsList = document.getElementById('teamInput').value;
        const playersList = document.getElementById('playerInput').value;
        
        db.ref('tipovacka_data').set({
            state: state,
            teams_list: teamsList,
            players_list: playersList
        });
    }

    // Reset pre databázu
    function protectedReset() {
        if(prompt("Heslo:") === "83pETHER04") {
            db.ref('tipovacka_data').remove().then(() => {
                location.reload();
            });
        }
    }
</script>
